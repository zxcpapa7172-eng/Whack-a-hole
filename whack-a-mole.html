<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>打地鼠遊戲</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body { 
      font-family: sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      color: #333;
      margin: 0;
      padding: 0;
    }

    .container {
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 10px;
    }

    header {
      text-align: center;
      flex-shrink: 0;
      margin-bottom: 10px;
    }

    h1 {
      color: white;
      margin: 5px 0;
      font-size: clamp(24px, 5vw, 48px);
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }

    .info-bar {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 5px 0;
      flex-wrap: wrap;
    }

    .info-item {
      color: white;
      font-size: clamp(12px, 2.5vw, 16px);
      font-weight: bold;
      background: rgba(0,0,0,0.2);
      padding: 6px 12px;
      border-radius: 20px;
    }

    .info-item span {
      color: #FFD700;
      font-size: 1.2em;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 8px 0;
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    button {
      font-size: clamp(12px, 2.5vw, 16px);
      padding: clamp(6px, 1.5vw, 10px) clamp(12px, 2.5vw, 20px);
      background: white;
      color: #667eea;
      border: 2px solid #667eea;
      border-radius: 5px;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: bold;
      white-space: nowrap;
    }

    button:hover {
      background: #667eea;
      color: white;
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }

    button:active {
      transform: scale(0.98);
    }

    button.primary {
      background: #667eea;
      color: white;
      border-color: #667eea;
    }

    button.primary:hover {
      background: #764ba2;
      border-color: #764ba2;
    }

    .game-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 5px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: clamp(8px, 1.5vw, 15px);
      width: 100%;
      max-width: 400px;
      aspect-ratio: 1;
      padding: 8px;
      flex-shrink: 0;
    }

    /* 針對不同螢幕寬度調整網格 */
    @media (min-width: 768px) {
      .grid {
        grid-template-columns: repeat(3, 1fr);
        max-width: 450px;
      }
    }

    @media (max-width: 480px) {
      .grid {
        grid-template-columns: repeat(3, 1fr);
        max-width: 100%;
      }
    }

    .hole {
      aspect-ratio: 1;
      background: #654321;
      border-radius: 50%;
      border: clamp(2px, 0.5vw, 3px) solid #333;
      box-shadow: inset 0 0 15px #000;
      position: relative; 
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.1s;
    }

    .hole:hover {
      transform: scale(1.05);
    }

    .mole {
      width: 90%;
      height: 90%;
      border-radius: 50%;
      position: absolute; 
      top: 5%;
      left: 5%;
      display: none; 
      background-size: cover; 
      background-position: center;
    }

    .mole.show { 
      display: block; 
    }

    #hitMessage {
      font-size: clamp(14px, 2.5vw, 18px);
      margin-top: 8px;
      color: #FFD700;
      min-height: 20px;
      font-weight: bold;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
      height: 20px;
    }

    #gameOverBox {
      display: none; 
      position: fixed; 
      top: 50%; 
      left: 50%;
      transform: translate(-50%, -50%);
      background: white; 
      border: 3px solid #333;
      border-radius: 10px;
      padding: clamp(20px, 5vw, 30px);
      font-size: clamp(16px, 2.5vw, 20px);
      text-align: center;
      z-index: 999;
      width: 90%;
      max-width: 350px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      max-height: 90vh;
      overflow-y: auto;
    }

    #gameOverBox h2 {
      color: #667eea;
      font-size: clamp(24px, 4vw, 28px);
      margin-bottom: 15px;
    }

    #finalScore {
      font-size: clamp(18px, 3vw, 22px);
      margin: 15px 0;
      color: #333;
    }

    #leaderboard {
      margin: 15px 0;
      text-align: left;
      background: #f5f5f5;
      padding: 15px;
      border-radius: 5px;
      max-height: 200px;
      overflow-y: auto;
    }

    #leaderboard h3 {
      margin-top: 0;
      color: #667eea;
      font-size: clamp(16px, 2.5vw, 18px);
    }

    #leaderboard p {
      margin: 8px 0;
      color: #333;
      font-size: clamp(14px, 2vw, 16px);
    }

    #gameOverBox button {
      margin-top: 8px;
      min-width: 120px;
      margin-left: 5px;
      margin-right: 5px;
    }

    /* 動畫效果 */
    @keyframes bounce {
      0% { transform: translateY(100%); }
      50% { transform: translateY(0); }
      100% { transform: translateY(100%); }
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      50% { transform: rotate(360deg); }
      100% { transform: rotate(0deg); }
    }

    @keyframes zoom {
      0% { transform: scale(0); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    .bounce { animation: bounce 0.8s ease; }
    .spin { animation: spin 1s linear; }
    .zoom { animation: zoom 0.6s ease; }

    /* 響應式設計 - 手機版 */
    @media (max-width: 480px) {
      .container {
        padding: 8px;
      }

      .info-bar {
        gap: 10px;
        margin: 6px 0;
      }

      .info-item {
        padding: 6px 12px;
        font-size: 12px;
      }

      .controls {
        gap: 6px;
        margin: 6px 0;
      }

      .game-area {
        padding: 8px;
      }

      #gameOverBox {
        padding: 20px;
        width: 95%;
      }
    }

    /* 響應式設計 - 平板版 */
    @media (min-width: 481px) and (max-width: 1024px) {
      .container {
        padding: 12px;
      }

      .info-bar {
        gap: 15px;
        margin: 10px 0;
      }

      .controls {
        gap: 10px;
        margin: 10px 0;
      }

      .game-area {
        padding: 15px;
      }
    }

    /* 響應式設計 - 桌面版 */
    @media (min-width: 1025px) {
      .container {
        padding: 20px;
      }

      .info-bar {
        gap: 30px;
        margin: 15px 0;
      }

      .controls {
        gap: 15px;
        margin: 15px 0;
      }

      .game-area {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🔨 打地鼠 🔨</h1>
      <div class="info-bar">
        <div class="info-item">分數：<span id="score">0</span></div>
        <div class="info-item">剩餘時間：<span id="time">30</span> 秒</div>
      </div>
    </header>

    <div class="controls">
      <button id="gameBtn" class="primary" onclick="toggleGame()">新遊戲</button>
      <button id="pauseBtn" onclick="togglePause()" style="display: none;">暫停</button>
      <button id="restartBtn" onclick="restartGame()" style="display: none;">重新開始</button>
    </div>

    <div class="game-area">
      <div class="grid" id="grid"></div>
      <p id="hitMessage"></p>
    </div>
  </div>

  <div id="gameOverBox">
    <h2>遊戲結束！</h2>
    <p id="finalScore"></p>
    <div id="leaderboard"></div>
    <button class="primary" onclick="restartGame()">重新開始</button>
    <button onclick="exitGame()">結束遊戲</button>
  </div>

  <script>
    const grid = document.getElementById('grid');
    const scoreEl = document.getElementById('score');
    const timeEl = document.getElementById('time');
    const gameOverBox = document.getElementById('gameOverBox');
    const finalScoreEl = document.getElementById('finalScore');
    const gameBtn = document.getElementById('gameBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const restartBtn = document.getElementById('restartBtn');
    const hitMessage = document.getElementById('hitMessage');
    const leaderboardEl = document.getElementById('leaderboard');
    
    let score = 0, timeLeft = 30, gameInterval, timerInterval, messageTimeout;
    let isRunning = false, isPaused = false;
    let leaderboard = JSON.parse(localStorage.getItem('whackMoleLeaderboard')) || [];

    const characters = [
      { img: 'images/大雄.png', name: '大雄', score: 1, animation: 'bounce' },
      { img: 'images/哆啦A夢.png', name: '哆啦A夢', score: 2, animation: 'zoom' },
      { img: 'images/哆啦美.png', name: '哆啦美', score: 3, animation: 'spin' },
      { img: 'images/靜香.png', name: '靜香', score: 3, animation: 'zoom' },
      { img: 'images/胖虎.png', name: '胖虎', score: -1, animation: 'bounce' },
      { img: 'images/小夫.png', name: '小夫', score: 2, animation: 'spin' },
      { img: 'images/小珠.png', name: '小珠', score: 2, animation: 'zoom' },
      { img: 'images/小杉.png', name: '小杉', score: 2, animation: 'bounce' },
      { img: 'images/大雄媽媽.png', name: '大雄媽媽', score: -2, animation: 'spin' }
    ];

    // 建立九個洞
    for (let i = 0; i < 9; i++) {
      const hole = document.createElement('div');
      hole.classList.add('hole');
      const mole = document.createElement('div');
      mole.classList.add('mole');
      hole.appendChild(mole);
      grid.appendChild(hole);
      
      mole.addEventListener('click', function(e) {
        if (mole.classList.contains('show') && isRunning && !isPaused) {
          e.stopPropagation();
          const hitScore = parseInt(mole.dataset.score);
          score += hitScore;
          scoreEl.textContent = score;
          
          // 顯示擊中的角色名稱
          hitMessage.textContent = `+ ${hitScore} (${mole.dataset.name})`;
          clearTimeout(messageTimeout);
          messageTimeout = setTimeout(() => {
            hitMessage.textContent = '';
          }, 800);
          
          // 移除角色
          mole.classList.remove('show');
          mole.classList.remove('bounce', 'spin', 'zoom');
        }
      });
    }

    function randomMole() {
      if (!isRunning || isPaused) return;
      
      const moles = document.querySelectorAll('.mole');
      moles.forEach(m => m.classList.remove('show', 'bounce', 'spin', 'zoom'));
      
      const random = Math.floor(Math.random() * moles.length);
      const mole = moles[random];
      const char = characters[Math.floor(Math.random() * characters.length)];
      
      mole.style.backgroundImage = `url(${char.img})`;
      mole.dataset.name = char.name;
      mole.dataset.score = char.score;
      mole.dataset.animation = char.animation;
      mole.classList.add('show', char.animation);
    }

    function updateLeaderboard() {
      leaderboard.push(score);
      leaderboard.sort((a, b) => b - a);
      if (leaderboard.length > 5) {
        leaderboard = leaderboard.slice(0, 5);
      }
      // 保存到本地儲存
      localStorage.setItem('whackMoleLeaderboard', JSON.stringify(leaderboard));
      
      leaderboardEl.innerHTML = "<h3>🏆 排行榜 🏆</h3>";
      leaderboard.forEach((s, i) => {
        const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '';
        leaderboardEl.innerHTML += `<p>${medal} ${i + 1}. ${s} 分</p>`;
      });
    }

    function startGame(resetTime = true) {
      clearInterval(gameInterval);
      clearInterval(timerInterval);
      clearTimeout(messageTimeout);
      
      score = 0;
      scoreEl.textContent = score;
      hitMessage.textContent = "";
      
      if (resetTime) {
        timeLeft = 30;
      }
      timeEl.textContent = timeLeft;
      gameOverBox.style.display = "none";
      
      // 清除所有地鼠
      const moles = document.querySelectorAll('.mole');
      moles.forEach(m => m.classList.remove('show', 'bounce', 'spin', 'zoom'));
      
      // 隐藏開始按鈕，显示暫停和重新開始按鈕
      gameBtn.style.display = "none";
      pauseBtn.style.display = "inline-block";
      restartBtn.style.display = "inline-block";
      pauseBtn.textContent = "暫停";
      
      isRunning = true;
      isPaused = false;
      
      // 立即显示第一个地鼠
      randomMole();
      gameInterval = setInterval(randomMole, 1000);
      
      timerInterval = setInterval(() => {
        timeLeft--;
        timeEl.textContent = timeLeft;
        
        if (timeLeft <= 0) {
          clearInterval(gameInterval);
          clearInterval(timerInterval);
          endGame();
        }
      }, 1000);
    }

    function togglePause() {
      if (!isPaused) {
        // 暫停遊戲
        clearInterval(gameInterval);
        clearInterval(timerInterval);
        pauseBtn.textContent = "繼續";
        isPaused = true;
      } else {
        // 繼續遊戲
        pauseBtn.textContent = "暫停";
        isPaused = false;
        
        gameInterval = setInterval(randomMole, 1000);
        timerInterval = setInterval(() => {
          timeLeft--;
          timeEl.textContent = timeLeft;
          
          if (timeLeft <= 0) {
            clearInterval(gameInterval);
            clearInterval(timerInterval);
            endGame();
          }
        }, 1000);
      }
    }

    function endGame() {
      isRunning = false;
      isPaused = false;
      
      // 显示開始按鈕，隐藏暫停和重新開始按鈕
      gameBtn.style.display = "inline-block";
      pauseBtn.style.display = "none";
      restartBtn.style.display = "none";
      
      finalScoreEl.textContent = "你的分數是：" + score;
      updateLeaderboard();
      gameOverBox.style.display = "block";
    }

    function restartGame() {
      startGame(true);
    }

    function exitGame() {
      // 隐藏游戏结束对话框
      gameOverBox.style.display = "none";
      
      // 显示开始按钮
      gameBtn.style.display = "inline-block";
      pauseBtn.style.display = "none";
      restartBtn.style.display = "none";
      
      // 重置游戏状态
      isRunning = false;
      isPaused = false;
      score = 0;
      timeLeft = 30;
      scoreEl.textContent = "0";
      timeEl.textContent = "30";
      hitMessage.textContent = "";
      
      // 清除所有地鼠
      const moles = document.querySelectorAll('.mole');
      moles.forEach(m => m.classList.remove('show', 'bounce', 'spin', 'zoom'));
    }

    function toggleGame() {
      if (!isRunning) {
        startGame(true);
      }
    }
  </script>
</body>
</html>
